# Drop-in override for mullvad-daemon.service
# Place at: /etc/systemd/system/mullvad-daemon.service.d/override.conf
#
# PURPOSE:
# Wraps mullvad-daemon in proxychains4 so all its outbound TCP connections
# are routed through Tor SOCKS5 (127.0.0.1:9050).
# This makes Mullvad's WireGuard (via Udp2Tcp) tunnel through Tor.
#
# NOTES:
# - ExecStart= (empty) clears the original command before setting the new one.
#   Without the empty line, systemd would try to run BOTH start commands.
# - proxychains4 -q suppresses the "[proxychains] DLL init" noise in logs.
# - Requires tor@default.service to be running at port 9050 first.

[Unit]
After=tor@default.service tor-exempt.service
Requires=tor@default.service tor-exempt.service

[Service]
ExecStart=
ExecStart=/usr/bin/proxychains4 -q /usr/bin/mullvad-daemon -v --disable-stdout-timestamps
