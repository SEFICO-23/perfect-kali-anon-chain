# /etc/wsl.conf — WSL2 configuration for Kali
# Apply with: wsl --shutdown (from PowerShell), then restart Kali

[boot]
# Enable systemd — required for service management (tor, mullvad-daemon, etc.)
# Boot networking handled by kali-network.service (systemd)
systemd = true

[automount]
# Mount Windows drives (/mnt/c) — needed for cross-filesystem access
enabled = true

[network]
# Do not auto-generate /etc/resolv.conf
# DNS is managed by kali-boot-network.sh (plain) or anon-chain (VPN)
generateResolvConf = false

[interop]
# Disable running Windows executables from Kali
enabled = false
# Prevent Windows PATH from appearing in Kali's PATH
appendWindowsPath = false
