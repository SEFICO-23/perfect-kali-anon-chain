# relay.conf — Mullvad multihop relay selection for the anonymization chain
#
# This file documents the recommended relay configuration for both
# the Windows and Kali Mullvad connections. Both sides use multihop
# (entry relay → exit relay) for maximum jurisdiction separation.
#
# The entry server sees your source IP but not your destination.
# The exit server sees your destination but not your source.
# Even if one relay is compromised, the attacker only gets half the picture.
#
# Place this file at: /etc/kali-anon-chain/relay.conf
# Used by: mullvad-multihop-fix.sh

# ── Windows Mullvad (Layer 1) ─────────────────────────────────────────────
# Your ISP sees only encrypted WireGuard traffic to this entry relay.
# DAITA + Lockdown mode should be ON for the Windows side.
#
# [windows]
# entry = rs  (Serbia — outside Five/Nine/Fourteen Eyes, outside EU)
# exit  = pt  (Portugal — clean IP pools, good connectivity to EU targets)

# ── Kali Mullvad (Layer 4 — VPN-over-Tor) ─────────────────────────────────
# Tor exit node connects to this entry relay via Udp2Tcp.
# DAITA and Quantum Resistance must be OFF for the Kali side.
#
# [kali]
# entry = rs  (Serbia — same rationale as above)
# exit  = pt  (Portugal — clean, unblacklisted Mullvad exit IPs)

# ── Relay Selection Criteria ──────────────────────────────────────────────
#
# Entry relay (where traffic enters Mullvad):
#   - Outside Five Eyes (US, UK, CA, AU, NZ)
#   - Outside Nine Eyes (+ DK, FR, NL, NO)
#   - Outside Fourteen Eyes (+ DE, BE, IT, SE, ES)
#   - Outside EU (to avoid EU data retention directives)
#   - Low latency to your infrastructure
#
# Exit relay (where traffic leaves Mullvad to the target):
#   - Clean, unblacklisted IP pools
#   - Close to your targets for performance
#   - Avoid countries that aggressively geoblock
#
# Good entry candidates:  rs (Serbia), ch (Switzerland), md (Moldova)
# Good exit candidates:   pt (Portugal), ro (Romania), bg (Bulgaria)
#
# To change relays:
#   mullvad relay set tunnel wireguard --entry-location rs
#   mullvad relay set location pt

# ── Current Configuration ─────────────────────────────────────────────────
ENTRY_RELAY=rs
EXIT_RELAY=pt
