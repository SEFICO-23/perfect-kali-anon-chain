# /etc/proxychains4.conf — proxychains4 configuration
# Place at: /etc/proxychains4.conf inside Kali

# strict_chain: all proxies in [ProxyList] must be used in order
# If Tor is down, the connection fails (no fallback to direct)
strict_chain

# Proxy DNS requests through the chain
# Without this, DNS lookups go direct — leaking which hosts you're connecting to
proxy_dns

# Suppress "[proxychains] DLL init: proxychains-4.x.x.so" on every connection
quiet_mode

# Timeout settings (milliseconds)
# Increased timeouts for Tor circuit latency — default 8s connect is too
# short for multi-hop Tor circuits during network congestion
tcp_read_time_out 60000
tcp_connect_time_out 30000

[ProxyList]
# Route through local Tor SOCKS5 daemon
# IMPORTANT: Must be socks5, not socks4
# socks4 doesn't support hostname resolution through the proxy (DNS leaks)
# socks5 resolves hostnames inside the proxy (DNS through Tor)
socks5  127.0.0.1  9050
